<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서비스 점검 중 - JAVAJAVA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #ffffff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            width: 90%;
            padding: 20px;
        }

        .image-container {
            width: 100%;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 200px;
        }

        .image-container img {
            width: 280px;
            height: 280px;
            object-fit: contain;
        }

        @media (min-width: 768px) {
            .image-container img {
                width: 360px;
                height: 360px;
            }
        }

        .title {
            font-size: 30px;
            font-weight: 900;
            color: #111827;
            margin-bottom: 16px;
            letter-spacing: -0.025em;
        }

        .description {
            font-size: 16px;
            font-weight: 500;
            color: #6b7280;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #FF5A5A;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        .auto-info {
            font-size: 13px;
            font-weight: bold;
            color: #9ca3af;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
