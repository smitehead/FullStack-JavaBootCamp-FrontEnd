server {
    listen 80;

    # 1. React 정적 파일(화면) 제공
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # React Router 새로고침 에러 방지용 설정
        try_files $uri $uri/ /index.html;
    }

    # 2. 백엔드(Spring Boot)로 API 요청 전달 (리버스 프록시)
    # 프론트에서 /api/... 로 요청하면 백엔드로 토스합니다.
    location /api/ {
        proxy_pass http://backend:8080/; # 백엔드 컨테이너 이름(backend)으로 바로 통신!
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 3. 🚨 실시간 경매(SSE) 전용 통로 열어두기 🚨
    # Nginx가 응답을 모았다가 보내는 버퍼링 기능을 끄고 즉시 보내도록 설정
    location /api/sse/ {
        proxy_pass http://backend:8080/sse/;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
        proxy_cache off;
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }
}