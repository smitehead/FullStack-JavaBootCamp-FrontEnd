<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JAVAJAVA</title>
  <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
    }

    /* sonner: 컨테이너를 뷰포트 전체로 확장 */
    [data-sonner-toaster][data-sonner-toaster][data-sonner-toaster] {
      width: 100vw !important;
      left: 0 !important;
      right: 0 !important;
      transform: none !important;
      pointer-events: none !important;
    }

    /* sonner: toast를 margin auto로 중앙 정렬 (transform 안 건드림 → 스택 유지) */
    [data-sonner-toast][data-sonner-toast][data-sonner-toast] {
      left: 0 !important;
      right: 0 !important;
      margin-left: auto !important;
      margin-right: auto !important;
      width: fit-content !important;
      pointer-events: auto !important;
    }

    /* Custom scrollbar for better aesthetics */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #888;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

  </style>
<link rel="stylesheet" href="/index.css">
</head>

<body class="bg-gray-50 text-gray-900 antialiased">
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
